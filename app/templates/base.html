<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Farmadil — Gestión Farmacéutica{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Dropdown animation */
        .nav-dropdown { display: none; }
        .nav-dropdown-trigger:hover .nav-dropdown,
        .nav-dropdown-trigger:focus-within .nav-dropdown { display: block; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .nav-dropdown { animation: slideDown 0.15s ease-out; }
    </style>
</head>

<body class="bg-slate-50 text-gray-900 font-sans antialiased min-h-screen">

    <!-- ── HEADER ───────────────────────────────────────────────── -->
    <header class="bg-blue-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">

                <!-- Logo -->
                <a href="/" class="flex items-center gap-3 group">
                    <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center shadow-inner group-hover:bg-blue-500 transition-colors">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                        </svg>
                    </div>
                    <span class="text-xl font-extrabold text-white tracking-tight">FARMADIL</span>
                </a>

                <!-- Nav Links -->
                <nav class="flex items-center gap-1">

                    <!-- POS / Caja -->
                    <a href="/api/v1/sales/pos"
                       class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-blue-200 hover:text-white hover:bg-blue-700 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        POS / Caja
                    </a>

                    <!-- Inventario (Dropdown) -->
                    <div class="relative nav-dropdown-trigger">
                        <button class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-blue-200 hover:text-white hover:bg-blue-700 transition-all focus:outline-none">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                            </svg>
                            Inventario
                            <svg class="w-3 h-3 ml-0.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>

                        <!-- Dropdown panel -->
                        <div class="nav-dropdown absolute right-0 mt-1 w-56 bg-white rounded-xl shadow-xl border border-blue-100 py-1.5 z-50">
                            <a href="/api/v1/products/catalog"
                               class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">
                                <span class="text-lg">📦</span>
                                <div>
                                    <div class="font-semibold">Ver Inventario</div>
                                    <div class="text-xs text-gray-400">Catálogo visual de productos</div>
                                </div>
                            </a>
                            <div class="my-1 border-t border-gray-100"></div>
                            <a href="/api/v1/products/inventory-search"
                               class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">
                                <span class="text-lg">➕</span>
                                <div>
                                    <div class="font-semibold">Ingresar Productos</div>
                                    <div class="text-xs text-gray-400">Buscar y editar stock manual</div>
                                </div>
                            </a>
                            <a href="/api/v1/purchases/ingesta"
                               class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">
                                <span class="text-lg">📄</span>
                                <div>
                                    <div class="font-semibold">Ingresar Facturas</div>
                                    <div class="text-xs text-gray-400">Abastecimiento inteligente</div>
                                </div>
                            </a>
                        </div>
                    </div>

                </nav>
            </div>
        </div>
    </header>

    <!-- ── MAIN ──────────────────────────────────────────────────── -->
    <main>
        <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
