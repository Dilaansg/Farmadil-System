<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmadil — Sistema Farmacéutico</title>
    <meta name="description" content="Sistema de gestión de inventario y ventas para farmacias Farmadil.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .bg-grid {
            background-color: #eff6ff;
            background-image: 
                linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }
        .float { animation: float 4s ease-in-out infinite; }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.7s ease-out forwards; }
        .delay-1 { animation-delay: 0.15s; opacity: 0; }
        .delay-2 { animation-delay: 0.30s; opacity: 0; }
        .delay-3 { animation-delay: 0.45s; opacity: 0; }
    </style>
</head>
<body class="bg-grid min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Glow decorativo -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[700px] h-[300px] bg-blue-300/20 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Logo / icono flotante -->
    <div class="float mb-8 fade-up">
        <div class="w-20 h-20 bg-blue-700 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-300">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                    d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
        </div>
    </div>

    <!-- Nombre -->
    <h1 class="fade-up delay-1 text-6xl font-black text-blue-900 tracking-tight text-center leading-none mb-3">
        FARMADIL
    </h1>
    <p class="fade-up delay-2 text-gray-500 text-lg font-medium text-center mb-14">
        Sistema de Gestión Farmacéutica
    </p>

    <!-- Botones principales -->
    <div class="fade-up delay-3 flex flex-col sm:flex-row gap-4 w-full max-w-md">
        <a href="/api/v1/sales/pos"
           class="flex-1 flex items-center justify-center gap-3 bg-blue-700 hover:bg-blue-800 active:scale-95 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-blue-200 transition-all text-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Ingresar a Caja
        </a>
        <a href="/api/v1/products/catalog"
           class="flex-1 flex items-center justify-center gap-3 bg-white hover:bg-blue-50 active:scale-95 text-blue-700 font-bold py-4 px-6 rounded-2xl shadow border-2 border-blue-100 hover:border-blue-300 transition-all text-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            Ir al Inventario
        </a>
    </div>

    <!-- Pie de pagina sutil -->
    <p class="mt-16 text-gray-400 text-xs fade-up delay-3">
        Farmadil © {{ year }} · Sistema Interno
    </p>

</body>
</html>
