# alembic.ini — Configuración de Alembic (gestor de migraciones)
# Documentación: https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Ruta de los scripts de migración
script_location = alembic

# Formato de los nombres de archivos de migración
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone para los timestamps
timezone = UTC

# La URL de BD se sobreescribe en alembic/env.py leyendo del .env
# NO pongas credenciales aquí directamente
sqlalchemy.url = postgresql+psycopg2://placeholder:placeholder@localhost/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
